<!DOCTYPE html>
<html lang="fa">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daenerys Biz Hacking Tool</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(to bottom,#08162f,#111);

color:white;

font-family:tahoma,sans-serif;

min-height:100vh;

display:flex;

justify-content:center;

padding:10px;

}


.game{

width:100%;

max-width:500px;

}



h1{

text-align:center;

letter-spacing:2px;

font-size:26px;

}



.separator{

height:2px;

background:white;

margin:10px 0;

}



.legend-item{

display:flex;

align-items:center;

gap:8px;

margin:4px 0;

font-size:12px;

}



.small-box{

width:16px;

height:16px;

border-radius:4px;

}



.correct{

background:#32d74b;

color:#000;

}


.misplaced{

background:#d4b16a;

color:#000;

}


.wrong{

background:#ff3b30;

color:white;

}




#history{
height:250px;
overflow-y:auto;
border:1px solid rgba(255,255,255,.2);
border-radius:10px;
padding:8px;

display:flex;
flex-direction:column-reverse;
}



.guess-row{

display:flex;

justify-content:center;

gap:6px;

margin:6px;

}




.digit{

width:52px;

height:52px;

display:flex;

justify-content:center;

align-items:center;

font-size:26px;

font-weight:bold;

border-radius:6px;

}




.info{

text-align:center;

font-size:20px;

margin:10px;

}




.input-area{

display:flex;

justify-content:center;

gap:8px;

}



.num-input{

width:45px;

height:50px;

font-size:28px;

text-align:center;

border:none;

border-radius:6px;

}




.locked{

background:#32d74b;

color:black;

}




button{

height:45px;

padding:0 18px;

border:none;

border-radius:6px;

cursor:pointer;

font-weight:bold;

font-size:15px;

}



.guess-btn{

background:#30d158;

color:white;

}



.restart-btn{

background:#ff453a;

color:white;

}





#message{

text-align:center;

margin-top:10px;

font-size:18px;

}




.win{

color:#32d74b;

}


.lose{

color:#ff453a;

}





@media(max-width:600px){


h1{

font-size:21px;

}


#history{

height:220px;

}



.digit{

width:42px;

height:42px;

font-size:22px;

}



.num-input{

width:40px;

height:45px;

font-size:24px;

}



button{

font-size:13px;

padding:0 12px;

}


}


</style>

</head>



<body>


<div class="game">


<h1>Daenerys Biz Hacking Tool</h1>



<div class="separator"></div>



<div>


<div class="legend-item">
<div class="small-box correct"></div>
رقم صحیح و جای صحیح
</div>


<div class="legend-item">
<div class="small-box misplaced"></div>
رقم صحیح ولی جای اشتباه
</div>


<div class="legend-item">
<div class="small-box wrong"></div>
رقم اشتباه
</div>


</div>



<div class="separator"></div>



<div id="history"></div>



<div class="separator"></div>



<div class="info">

تلاش باقیمانده:

<span id="attempts">7</span>

</div>




<div class="input-area">


<input class="num-input" maxlength="1" inputmode="numeric">

<input class="num-input" maxlength="1" inputmode="numeric">

<input class="num-input" maxlength="1" inputmode="numeric">

<input class="num-input" maxlength="1" inputmode="numeric">


</div>



<br>



<div style="text-align:center">


<button class="guess-btn" onclick="checkGuess()">

حدس

</button>


<button class="restart-btn" onclick="newGame()">

بازی جدید

</button>


</div>




<div id="message"></div>


</div>






<script>


let secretNumber="";

let attempts=7;


let inputs=document.querySelectorAll(".num-input");


let lockedNumbers=[];



newGame();





function generateSecret(){


let digits=[];


while(digits.length<4){


let d=Math.floor(Math.random()*10).toString();


if(!digits.includes(d))

digits.push(d);


}


return digits.join("");

}






function newGame(){


secretNumber=generateSecret();


attempts=7;


lockedNumbers=[];



document.getElementById("history").innerHTML="";


document.getElementById("attempts").innerText=attempts;


document.getElementById("message").innerHTML="";



inputs.forEach(i=>{


i.value="";

i.disabled=false;

i.classList.remove("locked");


});


inputs[0].focus();


}






function focusNextAvailable(){


let next=Array.from(inputs).find(i=>!i.disabled && i.value==="");


if(next)

next.focus();


}







inputs.forEach((input,index)=>{


input.addEventListener("input",()=>{


// فقط عدد

input.value=input.value.replace(/[^0-9]/g,'');



// جلوگیری از عددهای سبز شده

if(lockedNumbers.includes(input.value)){


input.value="";


return;


}



if(input.value)

focusNextAvailable();



});







input.addEventListener("keydown",(e)=>{


if(e.key==="Enter"){


checkGuess();


}




if(e.key==="Backspace"){



if(input.value===""){


let p=index-1;



while(p>=0 && inputs[p].disabled)

p--;



if(p>=0){


inputs[p].focus();


inputs[p].value="";


}



}



}



});



});









function checkGuess(){



let guess="";



inputs.forEach(i=>{


guess+=i.value;


});




if(guess.length!==4){


showMessage("همه خانه ها را پر کنید");


return;


}






let row=document.createElement("div");


row.className="guess-row";



let correctCount=0;






for(let i=0;i<4;i++){



let box=document.createElement("div");


box.className="digit";


box.innerText=guess[i];





if(guess[i]===secretNumber[i]){



box.classList.add("correct");


correctCount++;



inputs[i].disabled=true;


inputs[i].classList.add("locked");



if(!lockedNumbers.includes(guess[i]))

lockedNumbers.push(guess[i]);



}




else if(secretNumber.includes(guess[i])){


box.classList.add("misplaced");


}



else{


box.classList.add("wrong");


}



row.appendChild(box);



}






let history=document.getElementById("history");


history.prepend(row);
history.scrollTop = 0;





attempts--;


document.getElementById("attempts").innerText=attempts;






inputs.forEach(i=>{


if(!i.disabled)

i.value="";


});



focusNextAvailable();






if(correctCount===4){



showMessage("🎉 تبریک! شما برنده شدید","win");


inputs.forEach(i=>i.disabled=true);


return;


}






if(attempts===0){


showMessage("❌ باختی! جواب: "+secretNumber,"lose");


inputs.forEach(i=>i.disabled=true);


}



}






function showMessage(text,cls=""){


let m=document.getElementById("message");


m.className=cls;


m.innerText=text;


}



</script>


</body>
</html>
